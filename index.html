<!DOCTYPE html>
<html>
    <head>
<style>

    body{
  
    height: 600px;

    display: flex;
    justify-content: center;
    align-items: center;

    background:
    radial-gradient(circle at top, #16324F, #0B1020 60%);
    
}

div{
    width: 270px;
    height: 270px;
    border: 6px solid #7Fc7B2;
    border-radius: 50%;
    text-align: center;
 animation: circle 3s linear infinite;
 background: #101322;
}
h2{
    color: #8EDDD8;
}
#uu{
    width: 150px;
  border: none;
    border-radius: 5px;
   background: linear-gradient(90deg, #7FC7B2, #4D8F8B);
    color: #EAFBFF;
    padding: 7px;
    animation: button 3s infinite alternate;
}
@keyframes button{

    from{
        box-shadow: 0 0 10px #5DAEFF;
    }

    to{
        box-shadow: 0 0 30px #ff7eb9;
    }
}
@keyframes circle{

    from{
        box-shadow: 0 0 10px #5DAEFF;
       
    }

    to{
        box-shadow: 0 0 30px #7CE7FF;
       
    }
}
#ii{
  border:1px solid #5FCBC3;
    border-radius: 8px;
    background: #111827;
    color: #DDF7F5;
    padding: 6px;
    transition: all 1s ease;
    outline: none;
}
#uu{
   border:1px solid #5FCBC3;
    border-radius: 8px;
    background: #1B2A4A;
    color: #DDF7F5;
    padding: 6px; 
}
#io{
    border:1px solid #5FCBC3;
    border-radius: 8px;
    background: #111827;
    color: #DDF7F5;
    padding: 6px;
    transition: all 0.4s ease;
    outline: none;
}
#io:hover{
border-color: #ff7eb9;
}
#ii:hover{
border-color: #ff7eb9;
}


</style>
    </head>
    <body>
   
        <div>
           
            <form>
        <h2>Login</h2>
        <input type="text" id="ii" placeholder="Username">
        <br><br>
        <input type="password" id="io"  placeholder="Password"><br><br>
        <input type="submit"  id= "uu" value="Sign In"><br><br>
        </form>
</div>
    </body>
</html>
